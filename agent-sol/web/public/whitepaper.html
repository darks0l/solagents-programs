<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SolAgents — Whitepaper</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root{--bg:#0a0a12;--card:rgba(15,15,25,.8);--border:rgba(255,255,255,.08);--text:#e0e0e8;--dim:#8888a0;--accent:#9945FF;--green:#14F195;--grad:linear-gradient(135deg,#9945FF,#14F195)}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);line-height:1.7}
    .bar{position:sticky;top:0;z-index:100;background:rgba(10,10,18,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px}
    .bar a{color:var(--dim);text-decoration:none;font-size:14px;transition:color .2s}
    .bar a:hover{color:var(--green)}
    .bar .logo{font-weight:700;font-size:18px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .wp{max-width:820px;margin:0 auto;padding:60px 24px 120px}
    .wp h1{font-size:2.6rem;font-weight:700;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:32px 0 16px;line-height:1.2}
    .wp h2{font-size:1.7rem;font-weight:600;color:#fff;margin:48px 0 16px;padding-bottom:8px;border-bottom:1px solid var(--border)}
    .wp h3{font-size:1.25rem;font-weight:600;color:#ddd;margin:28px 0 12px}
    .wp p{margin-bottom:14px}
    .wp strong{color:#fff}
    .wp em{color:var(--dim)}
    .wp a{color:var(--green);text-decoration:none}
    .wp a:hover{text-decoration:underline}
    .wp ul,.wp ol{margin:12px 0 20px 24px}
    .wp li{margin-bottom:6px}
    .wp table{width:100%;border-collapse:collapse;margin:16px 0 24px;font-size:.9rem}
    .wp th{background:rgba(153,69,255,.15);text-align:left;padding:10px 14px;font-weight:600;color:#fff;border-bottom:1px solid var(--border)}
    .wp td{padding:10px 14px;border-bottom:1px solid var(--border)}
    .wp tr:hover td{background:rgba(255,255,255,.02)}
    .wp pre{background:rgba(20,20,35,.9);border:1px solid var(--border);border-radius:8px;padding:20px;overflow-x:auto;margin:16px 0 24px;font-family:'JetBrains Mono',monospace;font-size:.85rem;color:var(--green);line-height:1.5}
    .wp code{font-family:'JetBrains Mono',monospace;background:rgba(153,69,255,.12);padding:2px 6px;border-radius:4px;font-size:.88em;color:var(--green)}
    .wp pre code{background:none;padding:0}
    .wp blockquote{border-left:3px solid var(--accent);padding:12px 20px;margin:16px 0 24px;background:rgba(153,69,255,.06);border-radius:0 8px 8px 0;color:var(--dim);font-style:italic}
    .wp hr{border:none;border-top:1px solid var(--border);margin:40px 0}
    .footer{text-align:center;margin-top:60px;padding-top:40px;border-top:1px solid var(--border);color:var(--dim)}
    .footer .brand{font-size:1rem;font-weight:600}
    .disc{font-size:.8rem;color:var(--dim);margin-top:40px;padding:20px;background:rgba(255,255,255,.02);border-radius:8px;border:1px solid var(--border)}
    @media(max-width:640px){.wp h1{font-size:2rem}.wp h2{font-size:1.4rem}.wp{padding:40px 16px 80px}}
  </style>
</head>
<body>
  <div class="bar">
    <span class="logo">SolAgents</span>
    <a href="/">← Back to App</a>
    <a href="/whitepaper.md" download>Download .md</a>
  </div>
  <div class="wp" id="content">Loading whitepaper...</div>
  <script>
    fetch('/whitepaper.md')
      .then(r=>r.text())
      .then(md=>{
        document.getElementById('content').innerHTML=marked.parse(md)+
          '<div class="footer"><p class="brand">Built by DARKSOL 🌑</p><p>Powered by Solana · On-Chain Escrow · Zero-Knowledge Messaging</p></div>'+
          '<div class="disc">This document is for informational purposes only and does not constitute financial advice. $AGENTS token purchases carry risk. Smart contracts, while audited, may contain undiscovered vulnerabilities.</div>';
      })
      .catch(()=>{document.getElementById('content').innerHTML='<p style="color:red">Failed to load whitepaper.</p>'});
  </script>
</body>
</html>
